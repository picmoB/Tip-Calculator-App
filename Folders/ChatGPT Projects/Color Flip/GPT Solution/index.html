<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Flipper</title>
  <style>
    body {
      text-align: center;
      /* New! */
      display: flex;
      flex-direction: column;
      align-items: center;
      /* ---- */
      padding: 50px;
      font-family: Arial, Helvetica, sans-serif;
      transition: background-color 0.3s ease;
    }

    #color {
      font-size: 2rem;
      margin-top: 20px;
    }

    button {
      padding: 10px 20px;
      font-size: 1rem;
      cursor: pointer;
    }

    #btn-holder {
      display: flex;
      flex-direction: column;
      align-content: center;
      gap: 10px;
      width: 300px;
    }

  </style>
</head>
<body>
  <h1>Background Color: <span class="txt" id="color">#FFFFFF</span></h1>
  <div id="btn-holder">
    <button id="btn">Change Color</button>
    <button id="copy-btn">Copy Text</button>
  </div>

  <script>
    const btn = document.getElementById("btn");
    const colorDisplay = document.getElementById("color");
    const colors = ['red', 'blue', 'green', 'yellow', 'purple', '#f15025', '#00b894', '#6c5ce7'];

    const copyBtn = document.getElementById("copy-btn");

    function copyTextFunc() {
      let copyText = document.querySelector(".txt");

      navigator.clipboard.writeText(copyText.innerHTML).then(() => {
        copyBtn.textContent = "Copied!";
        setTimeout(() => copyBtn.textContent = "Copy Text", 1500);
      });
    }

    btn.addEventListener("click", function() {
      const colorIndex = Math.floor(Math.random() * colors.length);
      const selectedColor = colors[colorIndex];

      document.body.style.backgroundColor = selectedColor;
      colorDisplay.textContent = selectedColor;
    });

    copyBtn.addEventListener("click", copyTextFunc);
  </script>
</body>
</html>
