<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <style>
        html {
            background: rgb(70, 70, 70);
        }

        body {
            display: flex;
            justify-content: center;
            text-align: center;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 20px;
        }

        #btn-holder {
            display: flex;
            justify-content: space-between;
            margin: 50px;
            gap: 10px;
        }

        .btn {
            width: 100px;
            height: 30px;
            border: none;
            border-radius: 20px;
        }

        .btn.lap {
            background-color: white;
            color: black;
        }

        .btn.reset {
            background-color: black;
            color: white;
        }

        #lap-time-log {
            margin-top: 20px;
        }

        #lap-time-log h2 {
            font-size: 1.2rem;
            color: white;
        }
    </style>
</head>
<body>
    <div class="digital-clock">
        <h1 id="time-log"><span id="hours">00</span>:<span id="minutes">00</span>:<span id="seconds">00</span></h1>

        <div id="btn-holder">
            <button class="btn lap" id="lap-time">Lap Time</button>
            <button class="btn reset" id="reset-time">Reset</button>
        </div>

        <div id="lap-time-log">Lap Time Log</div>
    </div>

    <script>
        const clockSeconds = document.getElementById("seconds").textContent;
        let secondsNum = parseInt(clockSeconds);

        const clockMinutes = document.getElementById("minutes").textContent;
        let minutesNum = parseInt(clockMinutes);

        const clockHours = document.getElementById("hours").textContent;
        let hoursNum = parseInt(clockHours);

        let lapCount = 1;

        setInterval(secondsInterval, 1000);

        function updateDisplay(num) {
            return String(num).padStart(2, "0");
        }

        function secondsInterval() {
            secondsNum++;

            if(secondsNum === 60) {
                secondsNum = 0;
                minutesNum++;
            }

            if(minutesNum === 60) {
                minutesNum = 0;
                hoursNum++;
            }

            document.getElementById("seconds").textContent = updateDisplay(secondsNum);
            document.getElementById("minutes").textContent = updateDisplay(minutesNum);
            document.getElementById("hours").textContent = updateDisplay(hoursNum);
        }

        const lapTimeBtn = document.getElementById("lap-time");
        const resetTimeBtn = document.getElementById("reset-time");

        function lapTimeLog() {
            const entry = document.createElement("h2");
            entry.textContent = `Lap ${lapCount++}: ${updateDisplay(hoursNum)}:${updateDisplay(minutesNum)}:${updateDisplay(secondsNum)}`;
            document.querySelector("#lap-time-log").appendChild(entry);
        }

        function resetTime() {
            secondsNum = 0;
            minutesNum = 0;
            hoursNum = 0;
            lapCount = 1;

            document.querySelector("#lap-time-log").innerHTML = "Lap Time Log";

            document.getElementById("seconds").textContent = updateDisplay(secondsNum);
            document.getElementById("minutes").textContent = updateDisplay(minutesNum);
            document.getElementById("hours").textContent = updateDisplay(hoursNum);
        }

        lapTimeBtn.addEventListener("click", lapTimeLog);
        resetTimeBtn.addEventListener("click", resetTime);
    </script>
</body>
</html>
