<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Advanced Stopwatch</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      background-color: #111;
      font-family: Arial, sans-serif;
      color: #00ffcc;
    }

    h1 {
      font-size: 4rem;
      margin-bottom: 10px;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    button {
      padding: 10px 20px;
      font-size: 1rem;
      background-color: #00ffcc;
      border: none;
      color: #111;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    #laps {
      margin-top: 30px;
      list-style: none;
      font-size: 1.2rem;
      padding: 0;
    }
  </style>
</head>
<body>
  <div class="digital-clock">
    <h1><span id="hours">00</span>:<span id="minutes">00</span>:<span id="seconds">00</span></h1>
    <div class="buttons">
      <button id="toggle-btn">Start</button>
      <button id="lap-btn">Lap</button>
      <button id="reset-btn">Reset</button>
    </div>
    <ul id="laps"></ul>
  </div>

  <script>
    let secondsNum = 0;
    let minutesNum = 0;
    let hoursNum = 0;
    let interval = null;
    let isRunning = false;

    const toggleBtn = document.getElementById("toggle-btn");
    const resetBtn = document.getElementById("reset-btn");
    const lapBtn = document.getElementById("lap-btn");
    const lapsList = document.getElementById("laps");

    function format(num) {
      return String(num).padStart(2, "0");
    }

    function updateTime() {
      secondsNum++;

      if (secondsNum === 60) {
        secondsNum = 0;
        minutesNum++;
      }

      if (minutesNum === 60) {
        minutesNum = 0;
        hoursNum++;
      }

      document.getElementById("seconds").textContent = format(secondsNum);
      document.getElementById("minutes").textContent = format(minutesNum);
      document.getElementById("hours").textContent = format(hoursNum);
    }

    toggleBtn.addEventListener("click", () => {
      if (!isRunning) {
        interval = setInterval(updateTime, 1000);
        toggleBtn.textContent = "Stop";
      } else {
        clearInterval(interval);
        toggleBtn.textContent = "Start";
      }
      isRunning = !isRunning;
    });

    resetBtn.addEventListener("click", () => {
      clearInterval(interval);
      isRunning = false;
      toggleBtn.textContent = "Start";
      secondsNum = 0;
      minutesNum = 0;
      hoursNum = 0;
      lapsList.innerHTML = "";

      document.getElementById("seconds").textContent = format(secondsNum);
      document.getElementById("minutes").textContent = format(minutesNum);
      document.getElementById("hours").textContent = format(hoursNum);
    });

    lapBtn.addEventListener("click", () => {
      if (isRunning) {
        const lapTime = `${format(hoursNum)}:${format(minutesNum)}:${format(secondsNum)}`;
        const li = document.createElement("li");
        li.textContent = `Lap: ${lapTime}`;
        lapsList.appendChild(li);
      }
    });
  </script>
</body>
</html>
