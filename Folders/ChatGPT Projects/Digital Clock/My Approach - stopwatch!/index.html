<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Stopwatch</title>
    <style>
        html {
            background: rgb(70, 70, 70);
        }

        body {
            display: flex;
            justify-content: center;
            text-align: center;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 20px;
        }

        #btn-holder {
            display: flex;
            justify-content: space-between;
            margin: 50px;
            gap: 10px;
        }

        .btn {
            width: 100px;
            height: 30px;
            border: none;
            border-radius: 20px;
        }

        .btn.lap {
            background-color: white;
            color: black;
        }

        .btn.reset {
            background-color: black;
            color: white;
        }
    </style>
</head>
<body>
    <div class="digital-clock">
        <h1 id="time-log"><span id="hours">00</span>:<span id="minutes">00</span>:<span id="seconds">00</span></h1>

        <div id="btn-holder">
            <button class="btn lap" id="lap-time">Lap Time</button>
            <button class="btn reset" id="reset-time">Reset</button>
        </div>

        <div id="lap-time-log">Lap Time Log</div>
    </div>

    <script>
        // =================================================================
        // Main Structure
        // =================================================================

        const clockSeconds = document.getElementById("seconds").textContent;
        let secondsNum = parseInt(clockSeconds);
        console.log(Number.isInteger(secondsNum));

        const clockMinutes = document.getElementById("minutes").textContent;
        let minutesNum = parseInt(clockMinutes);
        console.log(Number.isInteger(minutesNum));

        const clockHours = document.getElementById("hours").textContent;
        let hoursNum = parseInt(clockHours);
        console.log(Number.isInteger(hoursNum));

        setInterval(secondsInterval, 1000);

        // Initiating this function inserts "0" next to the number
        function updateDisplay(num) {
            return String(num).padStart(2, "0");
        }

        function secondsInterval() {
            secondsNum++;
            //secondsNum = secondsNum < 10 ? "0" + secondsNum : secondsNum;
            
            if(secondsNum === 60) {
                secondsNum = 0;
                minutesNum++;
                //minutesNum = minutesNum < 10 ? "0" + minutesNum : minutesNum;
            }

            if(minutesNum === 60) {
                minutesNum = 0;
                hoursNum++;
                //hoursNum = hoursNum < 10 ? "0" + hoursNum : hoursNum;
            }

            // 1) There are no display errors like 00:01:60 (now it's 00:01:00).
            // 2) Use formatting only when displaying, not when updating the time logic.

            document.getElementById("seconds").textContent = updateDisplay(secondsNum);
            document.getElementById("minutes").textContent = updateDisplay(minutesNum);
            document.getElementById("hours").textContent = updateDisplay(hoursNum);
        }

        // =================================================================
        // Lap Time & Reset Time
        // =================================================================

        const lapTimeBtn = document.getElementById("lap-time");
        const resetTimeBtn = document.getElementById("reset-time");

        function lapTimeLog() {
            console.log("Clicked lap-time Button");

            document.querySelector("#lap-time-log")
                .innerHTML +=
                `<h1>${updateDisplay(hoursNum)}:${updateDisplay(minutesNum)}:${updateDisplay(secondsNum)}</h1>`;
        }

        function resetTime() {
            console.log("Clicked reset-time Button");

            secondsNum = 0;
            minutesNum = 0;
            hoursNum = 0;

            document.querySelector("#lap-time-log").innerHTML = "";
            document.querySelector("#lap-time-log").innerHTML += "Lap Time Log";
        }

        lapTimeBtn.addEventListener("click", lapTimeLog);
        resetTimeBtn.addEventListener("click", resetTime);
    </script>
</body>
</html>
