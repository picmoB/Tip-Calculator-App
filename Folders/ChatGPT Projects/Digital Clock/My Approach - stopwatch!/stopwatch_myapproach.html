<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stopwatch with Lap Storage</title>
  <style>
    html {
      background: rgb(70, 70, 70);
    }

    body {
      display: flex;
      justify-content: center;
      text-align: center;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 20px;
    }

    #btn-holder {
      display: flex;
      justify-content: space-between;
      flex-direction: column;
      margin: 50px;
      gap: 10px;
    }

    .btn {
      width: 100px;
      height: 30px;
      border-radius: 20px;
    }

    .btn.lap {
      background-color: white;
      border: none;
      color: black;
    }

    .btn.reset {
      background-color: black;
      border: none;
      color: white;
    }

    .btn.toggle {
      background-color: rgb(70, 70, 70);
      border-width: 2px;
      border-style: solid;
      border-color: black;
    }

    .btn.clear {
      background-color: rgb(70, 70, 70);
      border-width: 2px;
      border-style: solid;
      border-color: black;
      text-align: center;
      margin: 10px;
      height: 40px;
    }

    .btn.delete {
      background-color: white;
      border: none;
      color: black;
    }

    #lap-time-log {
      margin-top: 20px;
    }

    #lap-time-log h2 {
      font-size: 1.2rem;
      color: white;
    }

    #lap-time-log button {
        background-color: white;
        border-radius: 20px;
        border: none;
        color: black;
        width: 100px;
        height: 30px;
    }
  </style>
</head>
<body>
  <div class="digital-clock">
    <h1 id="time-log"><span id="hours">00</span>:<span id="minutes">00</span>:<span id="seconds">00</span></h1>

    <div id="btn-holder">
      <button class="btn toggle" id="toggle-time">Start</button>
      <button class="btn lap" id="lap-time">Lap Time</button>
      <button class="btn reset" id="reset-time">Reset</button>
    </div>

    <div id="lap-time-log">Lap Time Log</div>
    <button class="btn clear" id="clear-laps">Clear Saved Laps</button>
  </div>

  <script>
    // =================================================================
    // Main Structure
    // =================================================================
    const secondsEl = document.getElementById("seconds");
    const minutesEl = document.getElementById("minutes");
    const hoursEl = document.getElementById("hours");

    let secondsNum = parseInt(secondsEl.textContent);
    let minutesNum = parseInt(minutesEl.textContent);
    let hoursNum = parseInt(hoursEl.textContent);
    let lapCount = 1;
    let counter = 0;

    function updateDisplay(num) {
      return String(num).padStart(2, "0");
    }

    function secondsInterval() {
      secondsNum++;

      if (secondsNum === 60) {
        secondsNum = 0;
        minutesNum++;
      }

      if (minutesNum === 60) {
        minutesNum = 0;
        hoursNum++;
      }

      secondsEl.textContent = updateDisplay(secondsNum);
      minutesEl.textContent = updateDisplay(minutesNum);
      hoursEl.textContent = updateDisplay(hoursNum);
    }

    // =================================================================
    // Lap Time & Reset Time
    // =================================================================

    const lapTimeBtn = document.getElementById("lap-time");
    const resetTimeBtn = document.getElementById("reset-time");

    lapTimeBtn.addEventListener("click", () => {
      if(counter % 2 === 1) {
        const lapText = `Lap ${lapCount++}: ${updateDisplay(hoursNum)}:${updateDisplay(minutesNum)}:${updateDisplay(secondsNum)}`;

        const entry = document.createElement("h2");
        entry.textContent = lapText;
        document.querySelector("#lap-time-log").appendChild(entry);

        const deleteLap = document.createElement("button");
        deleteLap.textContent = "Delete Lap";
        document.querySelector("#lap-time-log").appendChild(deleteLap);

        deleteLap.addEventListener("click", () => {
          entry.remove(self);
          deleteLap.remove(self);

          let storedLaps = JSON.parse(localStorage.getItem("laps")) || [];

          // Remove only that one lap
          storedLaps = storedLaps.filter(lap => lap !== lapText);

          // Saved updated list
          localStorage.setItem("laps", JSON.stringify(storedLaps));
        });

        // Save to localStorage
        let storedLaps = JSON.parse(localStorage.getItem("laps")) || [];
        storedLaps.push(lapText);
        localStorage.setItem("laps", JSON.stringify(storedLaps));
      }
    });

    resetTimeBtn.addEventListener("click", () => {
      secondsNum = 0;
      minutesNum = 0;
      hoursNum = 0;
      lapCount = 1;

      secondsEl.textContent = updateDisplay(secondsNum);
      minutesEl.textContent = updateDisplay(minutesNum);
      hoursEl.textContent = updateDisplay(hoursNum);
    });

    // =================================================================
    // Page Refresh Load Laps
    // =================================================================

    // Load laps from localStorage on page load
    window.addEventListener("DOMContentLoaded", () => {
      const storedLaps = JSON.parse(localStorage.getItem("laps")) || [];

      storedLaps.forEach((lapText) => {
        const li = document.createElement("h2");
        li.textContent = lapText;
        document.querySelector("#lap-time-log").appendChild(li);

        const de = document.createElement("button");
        de.textContent = "Delete Lap";
        document.querySelector("#lap-time-log").appendChild(de);
        de.addEventListener("click", () => {
            li.remove(self);
            de.remove(self);

            let SL = JSON.parse(localStorage.getItem("laps")) || [];
            SL = SL.filter(lap => lap !== lapText);
            localStorage.setItem("laps", JSON.stringify(SL));
        });

        lapCount++;
      });
    });

    const clearLaps = document.getElementById("clear-laps");

    // =================================================================
    // Clear & Toggle Button
    // =================================================================

    // Clear saved laps only
    clearLaps.addEventListener("click", () => {
        document.querySelector("#lap-time-log").innerHTML = "Lap Time Log";
        localStorage.removeItem("laps");

        lapCount = 1;
    });

    const toggleBtn = document.getElementById("toggle-time");
    let interval = null;

    toggleBtn.addEventListener("click", () => {
        counter++;

        if(counter % 2 === 1) {
            // Start the clock interval
            interval = setInterval(secondsInterval, 1000);
            toggleBtn.textContent = "Stop";
        } else {
            // Stop the clock interval
            clearInterval(interval);
            toggleBtn.textContent = "Start";
        }
    });
  </script>
</body>
</html>
