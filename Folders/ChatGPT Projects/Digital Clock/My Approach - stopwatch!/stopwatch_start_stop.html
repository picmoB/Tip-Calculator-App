<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stopwatch with Start/Stop</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 50px;
      background-color: #111;
      color: #00ffcc;
      flex-direction: column;
    }

    #toggle-btn {
      margin-top: 30px;
      padding: 10px 25px;
      font-size: 1rem;
      background-color: #00ffcc;
      border: none;
      color: #111;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="digital-clock">
    <h1><span id="hours">00</span>:<span id="minutes">00</span>:<span id="seconds">00</span></h1>
    <button id="toggle-btn">Start</button>
  </div>

  <script>
    let secondsNum = 0;
    let minutesNum = 0;
    let hoursNum = 0;

    let interval = null;
    let isRunning = false;

    const toggleBtn = document.getElementById("toggle-btn");

    function format(num) {
      return String(num).padStart(2, "0");
    }

    function updateTime() {
      secondsNum++;

      if (secondsNum === 60) {
        secondsNum = 0;
        minutesNum++;
      }

      if (minutesNum === 60) {
        minutesNum = 0;
        hoursNum++;
      }

      document.getElementById("seconds").textContent = format(secondsNum);
      document.getElementById("minutes").textContent = format(minutesNum);
      document.getElementById("hours").textContent = format(hoursNum);
    }

    toggleBtn.addEventListener("click", () => {
      if (!isRunning) {
        interval = setInterval(updateTime, 1000);
        toggleBtn.textContent = "Stop";
      } else {
        clearInterval(interval);
        toggleBtn.textContent = "Start";
      }
      isRunning = !isRunning;
    });
  </script>
</body>
</html>
