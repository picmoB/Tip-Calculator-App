<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Conference Ticket Generator — Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <header class="header">
      <h1>Conference Ticket Generator</h1>
      <p class="lead">Fill the form to generate your ticket. You can download it as an image.</p>
    </header>

    <section class="layout">
      <form id="ticket-form" novalidate>
        <fieldset>
          <legend>Attendee details</legend>

          <label for="fullName">Full name <span class="req">*</span></label>
          <input id="fullName" name="fullName" type="text" data-target="#ticket-name" required />
          <div class="hint" id="hint-fullName" aria-hidden="true"></div>

          <label for="company">Company</label>
          <input id="company" name="company" type="text" data-target="#ticket-company" />

          <label for="role">Role</label>
          <input id="role" name="role" type="text" data-target="#ticket-role" />

          <label for="ticketType">Ticket type</label>
          <select id="ticketType" name="ticketType" data-target="#ticket-type">
            <option value="General">General</option>
            <option value="VIP">VIP</option>
            <option value="Student">Student</option>
          </select>

          <label for="seat">Seat (optional)</label>
          <input id="seat" name="seat" type="text" data-target="#ticket-seat" />

        </fieldset>

        <div class="form-actions">
          <button id="generate-btn" type="button">Generate Ticket</button>
          <button id="download-btn" type="button" disabled>Download Ticket</button>
          <button id="reset-btn" type="reset">Reset</button>
        </div>
      </form>

      <aside class="ticket-preview" aria-live="polite" aria-atomic="true">
        <div class="ticket" id="ticket">
          <div class="ticket-left">
            <h2 id="ticket-name">Your Name</h2>
            <p id="ticket-company">Company</p>
            <p id="ticket-role">Role</p>
          </div>
          <div class="ticket-right">
            <p id="ticket-type">General</p>
            <p id="ticket-seat">Seat</p>
            <img src="./assets/images/logo.png" alt="Event logo" class="logo" onerror="this.style.display='none'">
          </div>
        </div>
        <p class="small muted">Preview updates live as you type.</p>
      </aside>
    </section>
  </main>

  <!-- Try CDN first; if it fails the onerror will load the local copy -->
  <script>
    (function() {
      var s = document.createElement('script');
      s.src = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
      s.crossOrigin = "anonymous";
      s.onerror = function() {
        var fallback = document.createElement('script');
        fallback.src = "./assets/js/html2canvas.min.js";
        document.head.appendChild(fallback);
      };
      document.head.appendChild(s);
    })();
  </script>

  <script src="script.js"></script>
</body>
</html>
