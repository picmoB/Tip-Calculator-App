<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>

    <h2>Form</h2>

    <!-- First Name -->
    <form>
        <label for="fname">First Name</label>
        <input type="text" id="fname" name="fname" placeholder="Enter your name"><br>
    
    <!-- E-mail -->
        <label for="email">Enter E-mail</label>
        <input type="email" id="email" name="email" placeholder="Enter E-Mail"><br>
    
    <!-- Phone Number -->
        <label for="tel">Phone Number</label>
        <input type="tel" id="number" name="pnumber" placeholder="Enter your phone number"><br>

    <!-- Message -->
        <textarea name="message" id="message" rows="18" cols="40" placeholder="Message"></textarea>
    
    <!-- Submit -->
        <button>
            <input type="submit" value="Submit"><br> 
        </button>
    </form>

</body>
</html>
