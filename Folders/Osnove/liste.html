<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste</title>
</head>
<body>
    <!-- Unordered list -->
    <h2>UL lista</h2>
    <ul>
        <li>List element</li>
        <li>List element</li>
        <li><a href="">Link list element</a></li>
    </ul>

    <!-- Ordered list-->
    <h2>OL lista</h2>
    <ol>
        <li>List element</li>
        <li>List element</li>
        <li><a href="">Link list element</a></li>
    </ol>

    <!-- Description list -->
    <h2>DL lista</h2>
    <dl>
        <dt>Mala kava</dt>
        <dd>S mlijekom ili slagom</dd>
        <dt>Velika kava</dt>
        <dd>S mlijekom ili slagom</dd>
    </dl>
    
</body>
</html>
