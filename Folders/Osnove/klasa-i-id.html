<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        /*Pristupanje pomoću HTML elementa*/
        h3{
            font-size: 15px /*!important*/;
            color:blue;
            line-height: 35px;
        }
        /*Pristupanje pomoću HTML ID-a*/
        #naslovVeci{
            font-size: 24px;
            color: brown;
        }
        /*Pristupanje pomoću HTML klasa*/
        .naslov{
            font-size: 22px;
            line-height: 12px;
        }
        .prvi{
            font-size: 40px;
        }

    </style>

</head>
<body>
    
    <p>HTML id atribut se koristi za određivanje jedinstvenog ID-a za HTML element</p>
    <h3 class="naslov">Ovo je moj prvi H3 naslov</h3>
    <h3 id="naslovVeci" class="naslov">Ovo je moj drugi H3 naslov</h3>
    <h3 class="naslov prvi">Ovo je moj treći H3 naslov</h3>

</body>
</html>
